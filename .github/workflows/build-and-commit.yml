name: Build and Commit Distribution Files

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # キャッシュなし: npm/vite キャッシュによるビルド差異を防ぐ

      - name: Install dependencies
        run: npm ci

      - name: Build widget library
        run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # .gitignore の dist/ 除外を一時的に無効化してステージングを確実にする
          sed -i 's|^dist/$||' .gitignore

          git add dist/
          git checkout -- .gitignore

          if git diff --cached --quiet; then
            echo "No changes to dist/, skipping commit."
            exit 0
          fi

          git commit -m "chore: Update build artifacts [skip ci]"
          git push
