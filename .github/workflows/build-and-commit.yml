name: Build Widget

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'README.md'
      - 'embed-generator/**'
      - 'tests/**'
      - 'scripts/verify-contracts.cjs'
      - '.github/workflows/build-and-commit.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'README.md'
      - 'embed-generator/**'
      - 'tests/**'
      - 'scripts/verify-contracts.cjs'
      - '.github/workflows/build-and-commit.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # キャッシュなし: npm/vite キャッシュによるビルド差異を防ぐ

      - name: Install dependencies
        run: npm ci

      - name: Build widget library
        run: npm run build

      - name: Verify public contracts
        run: npm run test:contracts
