name: Create Release with Widget Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # キャッシュなし: 確実に最新ソースからビルドする

      - name: Install dependencies
        run: npm ci

      - name: Build widget library
        run: npm run build

      - name: Commit dist/ to main and update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG_NAME="${GITHUB_REF_NAME}"

          # sparse-checkout を無効化して dist/ をインデックスに含める
          git sparse-checkout disable || true

          # main ブランチに切り替えて最新を取得
          git checkout main
          git pull origin main

          # .gitignore の dist/ 除外を一時的に無効化
          sed -i 's|^dist/$||' .gitignore

          git add dist/
          git checkout -- .gitignore

          if git diff --cached --quiet; then
            echo "dist/ is already up to date on main."
          else
            git commit -m "chore: Update build artifacts for ${TAG_NAME} [skip ci]"
            git push origin main
          fi

          # タグを最新の main コミット（dist/含む）に移動
          git tag -f "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}" --force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/turntable-viewer.js
            dist/turntable-viewer.esm.js
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
